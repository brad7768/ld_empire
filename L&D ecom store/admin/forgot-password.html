<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié — L&amp;D Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: "DM Sans", system-ui, sans-serif; }
    .admin-input {
      height: 2.5rem;
      border: 1px solid rgba(231, 229, 225, 0.95);
      border-radius: 0.5rem;
      background: #fafaf9;
      padding: 0 0.75rem;
      font-size: 0.8125rem;
      color: #1c1917;
      width: 100%;
    }
    .admin-input:focus {
      outline: none;
      border-color: #d6d3d1;
      box-shadow: 0 0 0 3px rgba(28, 25, 23, 0.06);
    }
    .admin-btn-primary {
      height: 2.5rem;
      padding: 0 1rem;
      border-radius: 0.5rem;
      background: #1c1917;
      color: #fdfaf5;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      width: 100%;
    }
    .admin-btn-primary:hover { background: #292524; }
    .admin-btn-primary:disabled { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body class="bg-stone-100 text-stone-900 min-h-full antialiased">
  <script src="../js/supabase-config.js"></script>

  <div class="flex flex-col w-full max-w-md mx-auto px-4 py-8 min-h-screen">
    <header class="mb-8">
      <div class="flex items-center gap-2 mb-1">
        <svg class="w-4 h-4 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
        <h1 class="text-xl font-semibold tracking-tight">L&amp;D</h1>
      </div>
      <p class="text-[12px] text-stone-500">Réinitialisation du mot de passe admin</p>
    </header>

    <section class="bg-white rounded-xl border border-stone-200/80 p-6 sm:p-8">
      <h2 class="text-[14px] font-semibold mb-2">Mot de passe oublié ?</h2>
      <p class="text-[13px] text-stone-500 mb-6 leading-relaxed">
        Entrez l'email de votre compte admin. Nous vous enverrons un lien pour choisir un nouveau mot de passe.
      </p>

      <form id="forgot-form" class="space-y-4">
        <div>
          <label for="email" class="block text-[11px] font-medium text-stone-500 mb-1.5">Email</label>
          <input id="email" type="email" required class="admin-input" autocomplete="username" placeholder="contact@exemple.com">
        </div>
        <button type="submit" id="submit-btn" class="admin-btn-primary">Envoyer le lien</button>
        <p id="feedback" class="text-[13px] hidden" role="status"></p>
      </form>

      <p class="mt-6 text-center text-[12px]">
        <a href="./index.html" class="text-stone-600 underline underline-offset-2 hover:text-stone-900">← Retour à la connexion</a>
      </p>
    </section>
  </div>

  <script type="module">
    import {
      createSupabaseClient,
      getSupabaseConfig,
      resetPasswordRedirectUrl,
      showFeedback,
      mapAuthError
    } from "./js/password-recovery.js";

    const form = document.getElementById("forgot-form");
    const feedback = document.getElementById("feedback");
    const submitBtn = document.getElementById("submit-btn");

    if (!getSupabaseConfig().url || !getSupabaseConfig().anonKey) {
      showFeedback(feedback, "Configuration Supabase manquante. Contactez l'administrateur technique.", true);
      submitBtn.disabled = true;
    } else {
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        if (!email) return;

        submitBtn.disabled = true;
        showFeedback(feedback, "Envoi en cours…", false);

        try {
          const sb = await createSupabaseClient();
          const { error } = await sb.auth.resetPasswordForEmail(email, {
            redirectTo: resetPasswordRedirectUrl()
          });
          if (error) throw error;

          showFeedback(
            feedback,
            "Si un compte existe pour cet email, un lien de réinitialisation vient d'être envoyé. Vérifiez votre boîte de réception (et les spams).",
            false
          );
          form.querySelector("#email").disabled = true;
        } catch (err) {
          showFeedback(feedback, mapAuthError(err.message), true);
          submitBtn.disabled = false;
        }
      });
    }
  </script>
</body>
</html>
